            const facs = document.getElementById('facsimile')
            const opacity = 1 / 3.25 * val
            facs.style.opacity = 1 - opacity
        }
        document.querySelectorAll('svg').forEach(function(svg) {svg.pauseAnimations(); svg.setCurrentTime(0);})
    </script>


</body></html>
